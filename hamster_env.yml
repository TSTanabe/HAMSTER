name: hamster_env
channels:
  - conda-forge
  - bioconda
dependencies:
  # --- Python ---
  - python>=3.8

  # --- Core scientific Python stack ---
  - numpy=1.24.4
  - pandas=3.0.3
  - scipy=1.18.0
  - scikit-learn=1.9.0
  - matplotlib=1.11.0

  # --- External bioinformatics tools ---
  - diamond
  - pyrodigal=3.7.1
  - mmseqs2
  - mafft
  - trimal
  - hmmer
  - pyzstd=0.17.0
